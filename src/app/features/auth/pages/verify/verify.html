<section class="max-w-md mx-auto space-y-8">
    <div class="flex items-start">
        <a routerLink="/login" class="p-2 border border-gray-200 rounded-md hover:bg-gray-50 transition-colors">
            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </a>
    </div>

    <div class="space-y-2">
        <h2 class="text-3xl font-extrabold text-[#001D3D]">Verify OTP</h2>
        <p class="text-gray-500 font-geist-mono text-sm leading-relaxed">
            Please enter the 6-digits code we have sent to:<br>
            <span class="text-[#001D3D] font-medium">user@example.com.</span>
            <a href="#" class="text-blue-600 hover:underline">Edit</a>
        </p>
    </div>

    <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()" class="space-y-8">
        <div class="flex justify-between items-center gap-2" formArrayName="otp">
            <div *ngFor="let control of otpArray.controls; let i = index" class="w-12 h-14">
                <input [formControlName]="i" type="text" maxlength="1" (input)="onInputChange($event, i)"
                    (keydown)="onKeyDown($event, i)"
                    class="w-full h-full text-center text-xl font-bold border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-geist-mono"
                    [ngClass]="{'border-blue-500 ring-2 ring-blue-100': control.value, 'border-gray-200': !control.value}">
            </div>
        </div>

        <div class="text-center font-geist-mono">
            @if(!canResend){
            <p class="text-gray-500 text-sm">You can request another code in: <span
                    class="font-semibold">{{timer}}s</span></p>
            } @else {
            <p class="text-sm text-gray-500">Didn't receive the code? <button type="button" (click)="resendCode()"
                    class="text-blue-600 font-semibold hover:underline">Resend</button></p>
            }
        </div>

        <div>
            <button type="submit"
                class="w-full bg-[#155DFC] text-white font-bold py-4 rounded-md hover:bg-blue-700 transition-colors font-geist-mono focus:ring-4 focus:ring-blue-200"
                [disabled]="verifyForm.invalid">
                Verify Code
            </button>
        </div>

        <div class="text-center">
            <p class="text-sm text-gray-500 font-medium font-geist-mono">
                Already have an account? <a routerLink="/login" class="text-blue-600 hover:underline">Login</a>
            </p>
        </div>
    </form>
</section>
