<form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="space-y-6 w-[50vh]">
  <div class="space-y-6 text-center">
    <h3 class="text-xl font-bold text-blue-600 font-geist-mono text-left">Verify OTP</h3>
    <p class="text-gray-600 font-geist-mono text-left">
      Please enter the 6-digit code we have sent to: <br />
      {{ email }}. 
      <button type="button" (click)="onEdit()" class="text-blue-600 hover:underline">Edit</button>
    </p>

    <!-- OTP Inputs -->
    <div class="flex justify-between items-center w-full max-w-[400px] mx-auto pt-4 pb-2">
      <input
        id="code1"
        formControlName="code1"
        type="text"
        maxlength="1"
        class="w-12 h-14 text-center text-xl font-bold border rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors font-geist-mono"
        [ngClass]="{'border-red-500 text-red-500': otpForm.get('code1')?.invalid && otpForm.get('code1')?.touched, 'border-gray-200': !otpForm.get('code1')?.invalid || !otpForm.get('code1')?.touched}"
        (input)="onInput($event, 'code2')"
        (keydown)="onKeyDown($event, null, 'code1')"
      />
      <input
        id="code2"
        formControlName="code2"
        type="text"
        maxlength="1"
        class="w-12 h-14 text-center text-xl font-bold border rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors font-geist-mono"
        [ngClass]="{'border-red-500 text-red-500': otpForm.get('code2')?.invalid && otpForm.get('code2')?.touched, 'border-gray-200': !otpForm.get('code2')?.invalid || !otpForm.get('code2')?.touched}"
        (input)="onInput($event, 'code3')"
        (keydown)="onKeyDown($event, 'code1', 'code2')"
      />
      <input
        id="code3"
        formControlName="code3"
        type="text"
        maxlength="1"
        class="w-12 h-14 text-center text-xl font-bold border rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors font-geist-mono"
        [ngClass]="{'border-red-500 text-red-500': otpForm.get('code3')?.invalid && otpForm.get('code3')?.touched, 'border-gray-200': !otpForm.get('code3')?.invalid || !otpForm.get('code3')?.touched}"
        (input)="onInput($event, 'code4')"
        (keydown)="onKeyDown($event, 'code2', 'code3')"
      />
      <input
        id="code4"
        formControlName="code4"
        type="text"
        maxlength="1"
        class="w-12 h-14 text-center text-xl font-bold border rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors font-geist-mono"
        [ngClass]="{'border-red-500 text-red-500': otpForm.get('code4')?.invalid && otpForm.get('code4')?.touched, 'border-gray-200': !otpForm.get('code4')?.invalid || !otpForm.get('code4')?.touched}"
        (input)="onInput($event, 'code5')"
        (keydown)="onKeyDown($event, 'code3', 'code4')"
      />
      <input
        id="code5"
        formControlName="code5"
        type="text"
        maxlength="1"
        class="w-12 h-14 text-center text-xl font-bold border rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors font-geist-mono"
        [ngClass]="{'border-red-500 text-red-500': otpForm.get('code5')?.invalid && otpForm.get('code5')?.touched, 'border-gray-200': !otpForm.get('code5')?.invalid || !otpForm.get('code5')?.touched}"
        (input)="onInput($event, 'code6')"
        (keydown)="onKeyDown($event, 'code4', 'code5')"
      />
      <input
        id="code6"
        formControlName="code6"
        type="text"
        maxlength="1"
        class="w-12 h-14 text-center text-xl font-bold border rounded-md focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors font-geist-mono"
        [ngClass]="{'border-red-500 text-red-500': otpForm.get('code6')?.invalid && otpForm.get('code6')?.touched, 'border-gray-200': !otpForm.get('code6')?.invalid || !otpForm.get('code6')?.touched}"
        (input)="onInput($event, null)"
        (keydown)="onKeyDown($event, 'code5', 'code6')"
      />
    </div>
    
    <p class="text-sm text-gray-500 font-geist-mono pt-4">
      You can request another code in: 60s
    </p>
  </div>

  <!-- Generic Error Box -->
  @if(showErrorBox){
  <div
    class="relative flex items-center justify-center p-4 bg-red-50 border border-red-300 rounded-lg"
  >
    <span class="text-red-500 font-medium font-geist-mono">Please enter a valid code</span>
    <button
      type="button"
      (click)="closeErrorBox()"
      class="absolute -top-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-white border border-red-300 rounded-full flex items-center justify-center text-red-500 hover:bg-gray-50 transition-colors"
    >
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
  </div>
  }

  <!-- Verify Button -->
  <div>
    <button
      type="submit"
      class="w-full bg-blue-50 text-[#001D3D] border border-blue-500 font-bold py-4 rounded-md hover:bg-blue-100 transition-colors font-geist-mono focus:ring-4 focus:ring-blue-200"
    >
      Verify Code
    </button>
  </div>
</form>
