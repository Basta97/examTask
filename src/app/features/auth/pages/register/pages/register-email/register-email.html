<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6 w-full">
  <!-- Email -->
  <div class="space-y-2">
    <label class="block text-sm font-semibold text-[#001D3D] font-geist-mono" for="email"
      >Email</label
    >
    <input
      id="email"
      formControlName="email"
      type="email"
      placeholder="user@example.com"
      class="w-full px-4 py-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors font-geist-mono placeholder:text-gray-300"
      [ngClass]="{'border-red-500 text-red-500': emailCtrl?.invalid && emailCtrl?.touched, 'border-gray-200': !emailCtrl?.invalid || !emailCtrl?.touched}"
    />
    <p
      *ngIf="emailCtrl?.invalid && emailCtrl?.touched"
      class="text-xs text-red-500 mt-1 font-geist-mono"
    >
      <span *ngIf="emailCtrl?.errors?.['required']">Email is required</span>
      <span *ngIf="emailCtrl?.errors?.['email']">Invalid email format</span>
    </p>
  </div>

  <!-- Generic Error Box -->
  @if(showErrorBox){
  <div
    class="relative flex items-center justify-center p-4 bg-red-50 border border-red-300 rounded-lg"
  >
    <span class="text-red-500 font-medium font-geist-mono">Something went wrong</span>
    <button
      type="button"
      (click)="closeErrorBox()"
      class="absolute -top-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-white border border-red-300 rounded-full flex items-center justify-center text-red-500 hover:bg-gray-50 transition-colors"
    >
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
  </div>
  }

  <!-- Create Account Button -->
  <div>
    <button
      type="submit"
      class="w-[50vh] bg-[#155DFC] text-white font-bold py-4 rounded-md hover:bg-blue-700 transition-colors font-geist-mono focus:ring-4 focus:ring-blue-200"
    >
      Next
    </button>
  </div>

  <!-- Login link -->
  <div class="text-center w-[50vh]">
    <p class="text-sm text-gray-500 font-medium font-geist-mono">
      Already have an account?
      <a routerLink="/login" class="text-blue-600 hover:underline">Login</a>
    </p>
  </div>
</form>
