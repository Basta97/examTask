<form [formGroup]="infoForm" (ngSubmit)="onSubmit()" class="space-y-6 w-full">
  <div class="space-y-6 text-center">
    <h3 class="text-xl font-bold text-blue-600 font-geist-mono text-left">Tell us more about you</h3>
  </div>

  <div class="flex gap-4 w-full">
    <!-- First Name -->
    <div class="space-y-2 flex-1">
      <label class="block text-sm font-semibold text-[#001D3D] font-geist-mono" for="first_name"
        >First name<span class="text-red-500">*</span></label
      >
      <input
        id="first_name"
        formControlName="firstname"
        type="text"
        placeholder="Ahmed"
        class="w-full px-4 py-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors font-geist-mono placeholder:text-gray-300"
        [ngClass]="{'border-red-500 text-red-500': firstNameCtrl?.invalid && firstNameCtrl?.touched, 'border-gray-200': !firstNameCtrl?.invalid || !firstNameCtrl?.touched}"
      />
      <p
        *ngIf="firstNameCtrl?.invalid && firstNameCtrl?.touched"
        class="text-xs text-red-500 mt-1 font-geist-mono"
      >
        First name is required
      </p>
    </div>

    <!-- Last Name -->
    <div class="space-y-2 flex-1">
      <label class="block text-sm font-semibold text-[#001D3D] font-geist-mono" for="last_name"
        >Last name<span class="text-red-500">*</span></label
      >
      <input
        id="last_name"
        formControlName="lastname"
        type="text"
        placeholder="Abdullah"
        class="w-full px-4 py-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors font-geist-mono placeholder:text-gray-300"
        [ngClass]="{'border-red-500 text-red-500': lastNameCtrl?.invalid && lastNameCtrl?.touched, 'border-gray-200': !lastNameCtrl?.invalid || !lastNameCtrl?.touched}"
      />
      <p
        *ngIf="lastNameCtrl?.invalid && lastNameCtrl?.touched"
        class="text-xs text-red-500 mt-1 font-geist-mono"
      >
        Last name is required
      </p>
    </div>
  </div>

  <!-- Username -->
  <div class="space-y-2">
    <label class="block text-sm font-semibold text-[#001D3D] font-geist-mono" for="username"
      >Username<span class="text-red-500">*</span></label
    >
    <input
      id="username"
      formControlName="username"
      type="text"
      placeholder="user123"
      class="w-full px-4 py-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors font-geist-mono placeholder:text-gray-300"
      [ngClass]="{'border-red-500 text-red-500': usernameCtrl?.invalid && usernameCtrl?.touched, 'border-gray-200': !usernameCtrl?.invalid || !usernameCtrl?.touched}"
    />
    <p
      *ngIf="usernameCtrl?.invalid && usernameCtrl?.touched"
      class="text-xs text-red-500 mt-1 font-geist-mono"
    >
      Username is required (min 3 chars)
    </p>
  </div>

  <!-- Phone -->
  <div class="space-y-2">
    <label class="block text-sm font-semibold text-[#001D3D] font-geist-mono" for="phone"
      >Phone</label
    >
    <div
      class="relative flex border rounded-md transition-colors"
      [ngClass]="{'border-red-500 focus-within:ring-red-200': phoneCtrl?.invalid && phoneCtrl?.touched, 'border-gray-200 focus-within:ring-2 focus-within:ring-blue-500': !phoneCtrl?.invalid || !phoneCtrl?.touched}"
    >
      <div
        class="flex items-center px-3 gap-2 border-r border-gray-200 bg-transparent shrink-0 cursor-pointer hover:bg-gray-50 transition-colors"
      >
        <img
          src="https://flagcdn.com/w20/eg.png"
          srcset="https://flagcdn.com/w40/eg.png 2x"
          width="20"
          alt="Egypt Flag"
        />
        <span class="text-sm font-semibold text-[#001D3D] font-geist-mono">EG(+20)</span>
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8 9l4 4 4-4"
          />
        </svg>
      </div>
      <input
        id="phone"
        formControlName="phone"
        type="tel"
        placeholder="1012345678"
        class="w-full px-4 py-3 focus:outline-none font-geist-mono placeholder:text-gray-300"
      />
    </div>
    <p
      *ngIf="phoneCtrl?.invalid && phoneCtrl?.touched"
      class="text-xs text-red-500 mt-1 font-geist-mono"
    >
      Valid phone number is required
    </p>
  </div>

  <!-- Generic Error Box -->
  @if(showErrorBox){
  <div
    class="relative flex items-center justify-center p-4 bg-red-50 border border-red-300 rounded-lg"
  >
    <span class="text-red-500 font-medium font-geist-mono">Something went wrong</span>
    <button
      type="button"
      (click)="closeErrorBox()"
      class="absolute -top-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-white border border-red-300 rounded-full flex items-center justify-center text-red-500 hover:bg-gray-50 transition-colors"
    >
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        />
      </svg>
    </button>
  </div>
  }

  <!-- Next Button -->
  <div>
    <button
      type="submit"
      class="w-[50vh] bg-blue-50 text-[#001D3D] border border-blue-500 font-bold py-4 rounded-md hover:bg-blue-100 transition-colors font-geist-mono focus:ring-4 focus:ring-blue-200"
    >
      Next <span class="ml-1">></span>
    </button>
  </div>
</form>
